<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Select2 Multi-Select with Bootstrap 4</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <link href="https://raw.githack.com/ttskch/select2-bootstrap4-theme/master/dist/select2-bootstrap4.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Select2 Multi-Select (Pill/Tag Style)</h3>
                    </div>
                    <div class="card-body">

                        <form>
                            <div class="form-group">
                                <label for="multiSelectSkills">Select your preferred programming languages:</label>
                                <select class="form-control select2-custom" id="multiSelectSkills" name="skills[]" multiple="multiple">
                                    <option value="html">HTML/CSS</option>
                                    <option value="js" selected>JavaScript</option>
                                    <option value="php">PHP</option>
                                    <option value="python">Python</option>
                                    <option value="java">Java</option>
                                    <option value="csharp">C#</option>
                                    <option value="ruby">Ruby</option>
                                    <option value="swift">Swift</option>
                                    <option value="go">Go</option>
                                    <option value="rust">Rust</option>
                                </select>
                                <small class="form-text text-muted mt-2">Start typing to search and select multiple options.</small>
                            </div>

                            <button type="submit" class="btn btn-success mt-3">Submit Selections</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RMRYy5qI+38cWlKpV9+zmx5nCPbCaLxgq/l7Pj5g/eR4R6Wn5wR5d+j19Hw0jT" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57B+Y1Yw4kL5R9U5L5j5p75B+f5p75C/l2v3Pz3t3A3" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function() {
            $('.select2-custom').select2({
                // Apply the Bootstrap 4 theme
                theme: 'bootstrap4',
                // Add a placeholder when no options are selected
                placeholder: "Type to find options...",
                // Set to true to allow clearing the selection (the 'x' button)
                allowClear: true,
                // Make sure the width is set to 100% of the parent container
                width: '100%' 
            });
        });
    </script>

</body>
</html>
